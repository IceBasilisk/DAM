<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .block-shadow-primary {
            box-shadow: 0 6px 0 0 rgba(112, 93, 0, 1);
        }
        .block-shadow-primary:active {
            box-shadow: 0 2px 0 0 rgba(112, 93, 0, 1);
            transform: translateY(4px);
        }
        .block-shadow-tertiary {
            box-shadow: 0 6px 0 0 rgba(127, 43, 0, 1);
        }
        .block-shadow-tertiary:active {
            box-shadow: 0 2px 0 0 rgba(127, 43, 0, 1);
            transform: translateY(4px);
        }
        .parchment-texture {
            background-image: radial-gradient(#fcf3d8 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body-md text-on-background min-h-screen flex items-center justify-center p-6">
<!-- Top Navigation Anchor (Simulated from JSON but hidden for Focused Transactional View) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-yellow-50 rounded-b-3xl border-b-4 border-yellow-800/10 shadow-[0_4px_0_0_rgba(133,77,14,0.3)] opacity-40 pointer-events-none">
<div class="text-2xl font-['Plus_Jakarta_Sans'] font-black uppercase tracking-tighter text-yellow-700 drop-shadow-md">TASK TREASURE</div>
<div class="w-10 h-10 rounded-full bg-yellow-200 border-2 border-yellow-600"></div>
</header>
<!-- Overlay Backdrop -->
<div class="fixed inset-0 bg-on-background/60 backdrop-blur-sm z-40"></div>
<!-- Forge New Task Pop-up -->
<div class="relative z-50 w-full max-w-lg parchment-texture bg-surface-container-low border-4 border-on-surface-variant rounded-[40px] p-8 shadow-[12px_12px_0_0_rgba(31,28,11,1)] overflow-hidden">
<!-- Decorative Header Ribbon -->
<div class="absolute top-0 left-0 right-0 h-4 bg-tertiary"></div>
<!-- Header Section -->
<div class="mb-10 text-center relative">
<h1 class="font-headline-lg text-headline-lg text-on-surface uppercase tracking-tight mb-2 drop-shadow-sm">
                FORGE NEW TASK
            </h1>
<div class="h-1.5 w-32 bg-primary mx-auto rounded-full"></div>
<div class="absolute -top-4 -right-4">
<span class="material-symbols-outlined text-tertiary text-4xl" data-icon="tempest">storm</span>
</div>
</div>
<!-- Form Fields -->
<div class="space-y-8">
<!-- Task Name Input -->
<div class="space-y-3">
<label class="font-label-bold text-label-bold text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="edit_note">edit_note</span>
                    TASK NAME
                </label>
<div class="relative">
<input class="w-full bg-surface-bright border-4 border-outline text-on-surface font-body-lg text-body-lg px-6 py-4 rounded-2xl focus:ring-0 focus:border-primary placeholder:text-outline-variant transition-colors outline-none" placeholder="e.g., Scrub the Decks" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-20">
<span class="material-symbols-outlined text-3xl" data-icon="ink_highlighter">ink_highlighter</span>
</div>
</div>
</div>
<!-- Select Mark & Color Section -->
<div class="space-y-4">
<label class="font-label-bold text-label-bold text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="palette">palette</span>
                    SELECT MARK &amp; COLOR
                </label>
<!-- Icon Selection Grid -->
<div class="grid grid-cols-4 gap-4">
<!-- Icon Item 1: Compass (Active State) -->
<button class="aspect-square bg-primary-container border-4 border-on-primary-container text-on-primary-container rounded-3xl flex items-center justify-center shadow-[4px_4px_0_0_rgba(112,93,0,1)] transition-transform active:scale-95">
<span class="material-symbols-outlined text-4xl" data-icon="explore" style="font-variation-settings: 'FILL' 1;">explore</span>
</button>
<!-- Icon Item 2: Anchor -->
<button class="aspect-square bg-surface border-4 border-outline-variant text-outline rounded-3xl flex items-center justify-center hover:border-primary hover:text-primary transition-all active:scale-95">
<span class="material-symbols-outlined text-4xl" data-icon="anchor">anchor</span>
</button>
<!-- Icon Item 3: Skull -->
<button class="aspect-square bg-surface border-4 border-outline-variant text-outline rounded-3xl flex items-center justify-center hover:border-primary hover:text-primary transition-all active:scale-95">
<span class="material-symbols-outlined text-4xl" data-icon="skull">skull</span>
</button>
<!-- Icon Item 4: Barrel -->
<button class="aspect-square bg-surface border-4 border-outline-variant text-outline rounded-3xl flex items-center justify-center hover:border-primary hover:text-primary transition-all active:scale-95">
<span class="material-symbols-outlined text-4xl" data-icon="inventory_2">inventory_2</span>
</button>
</div>
<!-- Color Selection Bar -->
<div class="flex justify-between items-center bg-surface-container-highest p-4 rounded-2xl border-2 border-outline-variant/30 mt-4">
<div class="flex gap-3">
<div class="w-8 h-8 rounded-full bg-primary border-4 border-on-primary-container shadow-sm cursor-pointer"></div>
<div class="w-8 h-8 rounded-full bg-secondary border-2 border-white/50 shadow-sm cursor-pointer hover:scale-110 transition-transform"></div>
<div class="w-8 h-8 rounded-full bg-tertiary border-2 border-white/50 shadow-sm cursor-pointer hover:scale-110 transition-transform"></div>
<div class="w-8 h-8 rounded-full bg-on-tertiary-fixed-variant border-2 border-white/50 shadow-sm cursor-pointer hover:scale-110 transition-transform"></div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant italic">Pirate's Gold</span>
</div>
</div>
</div>
<!-- Progress Indicator Visual (Loot Progress Bar Metaphor) -->
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-4 mt-8">
<button class="flex-1 px-8 py-5 rounded-2xl bg-surface-container-high border-4 border-outline text-on-surface-variant font-headline-md text-headline-md uppercase block-shadow-primary transition-all active:translate-y-1 active:shadow-none">
                CANCEL
            </button>
<button class="flex-[1.5] px-8 py-5 rounded-2xl bg-primary-container border-4 border-on-primary-container text-on-primary-container font-headline-md text-headline-md uppercase block-shadow-primary transition-all active:translate-y-1 active:shadow-none">
                CREATE TASK
            </button>
</div>

<div class="mt-10 opacity-40 grayscale contrast-125">
<img class="w-full h-24 object-cover rounded-2xl border-2 border-outline-variant" data-alt="A vintage hand-drawn parchment map fragment showing stylized coastlines, small pirate ships, and dotted lines indicating a hidden path. The map is rendered in warm sepia tones and golden hues, fitting a playful high-fidelity animated adventure style. Soft ambient lighting suggests a campfire setting with high contrast between ink lines and weathered paper texture." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCGGsHDdoCaDjN0PCgWMptHiH5VIo__hExvq62hJF3ordEl3yy9UEGbogrMudWFb6gaREbYpjAJCi9SBSMCSfWlZ6DH_CcJcpQI0nwxbJrnNl9XLXJBRaEHv3j6IA6tOh8xjI9YAzj3sEuPudEgGA8QvMgpVwPu1XtMZAsQeVMDVj35-fFPVJU9Arg1VFPVtzL9K0r11xQA6EiXJ6r1JqN9I5garB10vbokInPLxHix_HPxQV74IKXO231wllMPV4OymRf-G8rNkPM"/>
</div>
</div>
<!-- Bottom Nav Anchor (Simulated from JSON but hidden for Focused Transactional View) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 h-24 pb-safe bg-yellow-100 rounded-t-[40px] border-t-4 border-yellow-800/10 shadow-[0_-4px_10px_rgba(0,0,0,0.1)] opacity-40 pointer-events-none">
<div class="flex flex-col items-center text-yellow-800/60">
<span class="material-symbols-outlined">explore</span>
<span class="text-[12px] font-extrabold">Explore</span>
</div>
<div class="flex flex-col items-center bg-yellow-400 text-yellow-950 rounded-2xl px-6 py-2 shadow-[4px_4px_0_0_rgba(113,63,18,1)]">
<span class="material-symbols-outlined">anchor</span>
<span class="text-[12px] font-extrabold">Loot</span>
</div>
<div class="flex flex-col items-center text-yellow-800/60">
<span class="material-symbols-outlined">skull</span>
<span class="text-[12px] font-extrabold">Crew</span>
</div>
</nav>
</body></html>
