<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "secondary": "#00658d",
                    "surface-container-highest": "#ebe2c8",
                    "on-secondary": "#ffffff",
                    "on-background": "#1f1c0b",
                    "secondary-fixed": "#c6e7ff",
                    "on-tertiary-fixed-variant": "#7f2b00",
                    "inverse-on-surface": "#faf0d5",
                    "secondary-container": "#3dbeff",
                    "error-container": "#ffdad6",
                    "surface-variant": "#ebe2c8",
                    "background": "#fff9ed",
                    "on-primary": "#ffffff",
                    "primary": "#705d00",
                    "outline": "#7e775f",
                    "surface-container-low": "#fcf3d8",
                    "outline-variant": "#d0c6ab",
                    "inverse-surface": "#35301e",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .block-shadow {
            box-shadow: 6px 6px 0px 0px rgba(126, 119, 95, 1);
        }
        .btn-shadow {
            box-shadow: 0px 4px 0px 0px #544600;
        }
        .btn-active:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px 0px #544600;
        }
        .parchment-texture {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Atmospheric Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none opacity-20">
<div class="absolute -top-20 -left-20 w-96 h-96 bg-primary-container rounded-full blur-[120px]"></div>
<div class="absolute -bottom-20 -right-20 w-96 h-96 bg-secondary-container rounded-full blur-[120px]"></div>
</div>
<!-- Main Registration Shell -->
<main class="relative w-full max-w-[480px] z-10">
<!-- Ship Icon Header -->
<div class="flex justify-center mb-md">
<div class="w-32 h-32 rounded-full bg-primary-container border-4 border-outline p-1 block-shadow overflow-hidden flex items-center justify-center bg-surface-container-high">
<div class="w-full h-full rounded-full overflow-hidden relative">
<img alt="Stylized wooden pirate ship" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCq1tUJ8RyUsv3vEN_JXFW4hpPijI6egRMu8rSi87dohdXUIMjPdfNvKkaWiL3ZZpPS1_nf5HN7gwqsLfSvUHG6BuYPenUydxqSI8eAP357VkwdPdehorv2bf8-lf3KAGiJkIix1TePdrX7UAqq_91OV58tC8AdAyGEfblEt_5uwCYSxptFk1B_Jq-eZb5WwIsrDH-dPmpfjmjpGZR0b0W_9aoLlyqF2c5nojhEr461k_rqNXp9rLr3FyvqD1gO5wKuiTOQqLOhlng"/>
</div>
</div>
</div>
<!-- Parchment Card -->
<div class="bg-surface-container-low border-4 border-outline rounded-[2rem] p-lg block-shadow parchment-texture relative overflow-hidden">
<!-- Card Header Ribbon Metaphor -->
<div class="absolute top-0 left-0 right-0 h-2 bg-primary"></div>
<!-- Headlines -->
<div class="text-center mb-lg">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight mb-xs">Join the Crew!</h1>
<p class="font-body-md text-body-md text-on-surface-variant italic">Ready to chart your own course?</p>
</div>
<!-- Sign Up Form -->
<form class="space-y-md" onsubmit="event.preventDefault();">
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant px-1">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container border-4 border-outline rounded-xl font-body-md text-body-md focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-outline-variant" placeholder="Email address" type="email"/>
</div>
</div>
<!-- Password Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant px-1">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="key">key</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container border-4 border-outline rounded-xl font-body-md text-body-md focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant px-1">Confirm Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="key">key</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container border-4 border-outline rounded-xl font-body-md text-body-md focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Main CTA -->
<div class="pt-md">
<button class="w-full h-16 bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-2xl border-4 border-primary btn-shadow btn-active flex items-center justify-center space-x-sm uppercase tracking-wide transition-all group">
<span>ENLIST NOW</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="trending_flat">trending_flat</span>
</button>
</div>
</form>
<!-- Footer -->
<div class="mt-lg text-center pt-md border-t-2 border-outline-variant border-dashed">
<p class="font-label-bold text-label-bold text-on-surface-variant">
                    Already part of the crew? 
                    <a class="text-primary hover:underline underline-offset-4 ml-1" href="#">Log In</a>
</p>
</div>
</div>
</main>
<!-- Floating Atmosphere Interaction Script -->
<script>
        // Add "Sparkle" effect on click
        document.addEventListener('click', (e) => {
            const sparkle = document.createElement('div');
            sparkle.className = 'fixed pointer-events-none w-4 h-4 bg-primary-container rounded-full z-50 animate-ping';
            sparkle.style.left = `${e.clientX - 8}px`;
            sparkle.style.top = `${e.clientY - 8}px`;
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        });
    </script>
</body></html>
