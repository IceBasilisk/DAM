<!DOCTYPE html>

        }
        .pressed-state:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px rgba(31, 28, 11, 1);
        }
        .parchment-texture {
            background-color: #fff9ed;
            background-image: radial-gradient(#ebe2c8 0.5px, transparent 0.5px);
            background-size: 16px 16px;
        }

                    "fontFamily": {
                        "body-lg": ["Plus Jakarta Sans"],

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background parchment-texture min-h-screen pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-40 bg-surface border-b-4 border-surface-variant flex items-center justify-between px-md h-xl">
<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-primary hover:bg-surface-container-high transition-colors p-xs rounded-lg active:translate-y-0.5" data-icon="arrow_back">arrow_back</button>
<h1 class="font-headline-md text-headline-md font-extrabold text-primary">Forge New Task</h1>
</div>
<div class="material-symbols-outlined text-primary" data-icon="history_edu">history_edu</div>
</header>
<main class="max-w-xl mx-auto px-margin py-lg space-y-lg">
<!-- Task Name Section -->
<section class="space-y-sm">
<label class="font-label-bold text-label-bold text-on-surface-variant px-xs">LOG ENTRY NAME</label>
<div class="relative">
<input class="w-full h-16 px-md bg-surface-container-low border-4 border-on-background rounded-xl font-body-lg text-body-lg focus:outline-none focus:ring-4 focus:ring-primary-container block-shadow transition-all placeholder:text-outline-variant" placeholder="e.g., Scrub the Decks" type="text"/>
</div>
</section>
<!-- Mark Selection Section -->
<section class="space-y-sm">
<label class="font-label-bold text-label-bold text-on-surface-variant px-xs uppercase">Choose Thy Mark</label>
<div class="grid grid-cols-4 gap-base">
<!-- Compass -->
<button class="mark-btn flex flex-col items-center justify-center aspect-square bg-surface-container border-4 border-on-background rounded-xl block-shadow-sm hover:bg-surface-container-highest transition-all pressed-state group active-mark" data-mark="compass" onclick="selectMark(this)">
<span class="material-symbols-outlined text-4xl text-on-surface group-[.active-mark]:text-primary" data-icon="explore">explore</span>
<span class="font-label-sm text-label-sm mt-xs">Compass</span>
</button>
<!-- Anchor -->
<button class="mark-btn flex flex-col items-center justify-center aspect-square bg-surface-container border-4 border-on-background rounded-xl block-shadow-sm hover:bg-surface-container-highest transition-all pressed-state group" data-mark="anchor" onclick="selectMark(this)">
<span class="material-symbols-outlined text-4xl text-on-surface group-[.active-mark]:text-primary" data-icon="anchor">anchor</span>
<span class="font-label-sm text-label-sm mt-xs">Anchor</span>
</button>
<!-- Skull -->
<button class="mark-btn flex flex-col items-center justify-center aspect-square bg-surface-container border-4 border-on-background rounded-xl block-shadow-sm hover:bg-surface-container-highest transition-all pressed-state group" data-mark="skull" onclick="selectMark(this)">
<span class="material-symbols-outlined text-4xl text-on-surface group-[.active-mark]:text-primary" data-icon="skull">skull</span>
<span class="font-label-sm text-label-sm mt-xs">Skull</span>
</button>
<!-- Chest -->
<button class="mark-btn flex flex-col items-center justify-center aspect-square bg-surface-container border-4 border-on-background rounded-xl block-shadow-sm hover:bg-surface-container-highest transition-all pressed-state group" data-mark="chest" onclick="selectMark(this)">
<span class="material-symbols-outlined text-4xl text-on-surface group-[.active-mark]:text-primary" data-icon="inventory_2">inventory_2</span>
<span class="font-label-sm text-label-sm mt-xs">Chest</span>
</button>
</div>
</section>
<!-- Color Swatches Section -->
<section class="space-y-sm">
<label class="font-label-bold text-label-bold text-on-surface-variant px-xs uppercase">Guild Colors</label>
<div class="flex justify-between items-center bg-surface-container border-4 border-on-background p-md rounded-xl block-shadow-sm">
<!-- Gold -->
<button class="color-btn w-12 h-12 rounded-full border-4 border-on-background bg-primary-container ring-offset-2 transition-all active-color ring-4 ring-primary" onclick="selectColor(this, 'bg-primary-container')"></button>
<!-- Blue -->
<button class="color-btn w-12 h-12 rounded-full border-4 border-on-background bg-secondary ring-offset-2 transition-all" onclick="selectColor(this, 'bg-secondary')"></button>
<!-- Deep Orange -->
<button class="color-btn w-12 h-12 rounded-full border-4 border-on-background bg-tertiary ring-offset-2 transition-all" onclick="selectColor(this, 'bg-tertiary')"></button>
<!-- Dark Brown -->
<button class="color-btn w-12 h-12 rounded-full border-4 border-on-background bg-inverse-surface ring-offset-2 transition-all" onclick="selectColor(this, 'bg-inverse-surface')"></button>
</div>
</section>
<!-- Aesthetic Card Decoration -->
<div class="relative w-full h-40 overflow-hidden rounded-2xl border-4 border-on-background block-shadow mt-xl">
<img alt="Pirate planning scene" class="w-full h-full object-cover grayscale-[0.2] sepia-[0.3]" data-alt="A cinematic, high-contrast illustration of a pirate captain's planning desk in a low-lit cabin. Golden coins, a rolled parchment map, and a heavy iron compass rest on a thick dark wood surface. Soft, warm campfire light glows from the side, casting long, stylized shadows. The art style is bold and vibrant with thick outlines and a playful, epic casual gaming aesthetic, using a palette of gold, deep brown, and parchment cream." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCSeA8pYvQggIUiXo8zZp-ogyN1QHNMU7D39f4tdBTxBE6kmsiBSYCN_Oj_dKKpSG1vblnZVRnxq3Lzjg509nqbBBaQ3El-jnIkS9GTjPo08gqEFMDlwGvn5M566XqmLVoRb29XHJHbQd2GCpi50XH2i5EyTcdHXEGzA-4n2OhQZIhmqXWFPZxb7-St7LJ5qjQRo4ypLZNuEp_3OBfa1edwmT_yA8_E65U2_IkGkQjNibQ0lMXyRmkLD5Duce03B52cPTXyY9dRZ3M"/>
<div class="absolute inset-0 bg-gradient-to-t from-on-surface/60 to-transparent flex items-end p-md">
<p class="text-surface font-label-bold text-label-bold">PREPARE FOR THE VOYAGE</p>
</div>
</div>
<!-- Submit Button -->
<div class="pt-lg">
<button class="w-full h-xl bg-primary-container text-on-primary-container font-headline-md text-headline-md border-4 border-on-background rounded-xl block-shadow pressed-state flex items-center justify-center gap-sm group">
<span class="material-symbols-outlined" data-icon="auto_fix_high" style="font-variation-settings: 'FILL' 1;">auto_fix_high</span>
                Create Task
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-margin py-base bg-surface-container border-t-4 border-surface-variant shadow-[0_-4px_0_0_rgba(0,0,0,0.1)] rounded-t-xl z-50">
<div class="flex flex-col items-center justify-center text-on-surface-variant p-xs hover:text-primary transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-label-bold text-label-bold">Map</span>
</div>
<div class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-sm py-xs translate-y-[-2px] hover:text-primary transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="hardware" style="font-variation-settings: 'FILL' 1;">hardware</span>
<span class="font-label-bold text-label-bold">Forge</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-xs hover:text-primary transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
<span class="font-label-bold text-label-bold">Vault</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-xs hover:text-primary transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-label-bold text-label-bold">Crew</span>
</div>
</nav>
<script>
        function selectMark(element) {
            document.querySelectorAll('.mark-btn').forEach(btn => {
                btn.classList.remove('active-mark', 'bg-primary-container/20');
            });
            element.classList.add('active-mark', 'bg-primary-container/20');
        }

        function selectColor(element, colorClass) {
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.remove('ring-4', 'ring-primary', 'active-color');
            });
            element.classList.add('ring-4', 'ring-primary', 'active-color');
            
            // Visual feedback on the button itself or other elements
            console.log("Selected guild color: " + colorClass);
        }
    </script>
</body></html>
