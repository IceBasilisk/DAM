<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;family=Lexend:wght@500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#705d00",
                    "on-tertiary-container": "#a83b00",
                    "on-secondary-fixed-variant": "#004c6b",
                    "surface-variant": "#ebe2c8",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#ffe16d",
                    "inverse-on-surface": "#faf0d5",
                    "on-tertiary-fixed-variant": "#7f2b00",
                    "tertiary-fixed": "#ffdbce",
                    "surface-container-high": "#f1e8cd",
                    "primary-fixed-dim": "#e9c400",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed": "#370e00",
                    "surface-container-low": "#fcf3d8",
                    "on-primary-fixed": "#221b00",
                    "error": "#ba1a1a",
                    "on-surface": "#1f1c0b",
                    "on-secondary-fixed": "#001e2d",
                    "on-background": "#1f1c0b",
                    "surface": "#fff9ed",
                    "on-secondary-container": "#004a69",
                    "on-error-container": "#93000a",
                    "tertiary": "#a63b00",
                    "surface-bright": "#fff9ed",
                    "tertiary-fixed-dim": "#ffb599",
                    "on-primary": "#ffffff",
                    "secondary-container": "#3dbeff",
                    "on-primary-container": "#705e00",
                    "primary": "#705d00",
                    "outline-variant": "#d0c6ab",
                    "on-surface-variant": "#4d4732",
                    "inverse-surface": "#35301e",
                    "surface-dim": "#e2dabf",
                    "on-tertiary": "#ffffff",
                    "background": "#fff9ed",
                    "surface-container-highest": "#ebe2c8",
                    "surface-container": "#f7eed2",
                    "on-secondary": "#ffffff",
                    "secondary": "#00658d",
                    "secondary-fixed": "#c6e7ff",
                    "outline": "#7e775f",
                    "primary-container": "#ffd700",
                    "inverse-primary": "#e9c400",
                    "on-error": "#ffffff",
                    "secondary-fixed-dim": "#83cfff",
                    "tertiary-container": "#ffd0bf",
                    "on-primary-fixed-variant": "#544600"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "12px",
                    "md": "24px",
                    "base": "8px",
                    "xs": "4px",
                    "xl": "64px",
                    "lg": "40px",
                    "margin": "24px",
                    "gutter": "20px"
            },
            "fontFamily": {
                    "headline-md": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "headline-xl": ["Plus Jakarta Sans"],
                    "label-bold": ["Lexend"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "label-sm": ["Lexend"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "800"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-xl": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-bold": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "500"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .block-shadow-primary {
            box-shadow: 0px 6px 0px 0px rgba(112, 93, 0, 1);
        }
        .block-shadow-error {
            box-shadow: 0px 6px 0px 0px rgba(147, 0, 10, 1);
        }
        .block-shadow-container {
            box-shadow: 8px 8px 0px 0px rgba(77, 71, 50, 0.2);
        }
        .pressed-state:active {
            transform: translateY(4px);
            box-shadow: 0px 2px 0px 0px rgba(0, 0, 0, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-background min-h-screen">
<!-- Top App Bar -->
<header class="flex justify-between items-center w-full px-6 h-20 sticky top-0 z-50 bg-[#F5E6D3] dark:bg-slate-900 border-b-4 border-amber-900 shadow-[0px_4px_0px_0px_rgba(120,60,40,1)]">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full border-2 border-amber-900 overflow-hidden bg-amber-200">
<img class="w-full h-full object-cover" data-alt="Stylized 2D pirate captain illustration with a classic tricorne hat and a confident grin, high-contrast vector art style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDa4pTk9zC6QCA08HxTR5JuEkBGl1zRcnKZkI9GjbGjwMHPhnGo47Ri7_DAoeI229zDjlADj_bnAn7PnLEdG8hjt3suJQFgaDSkvsBDiT5Tf0b7VcggVMK0drJoOXWaDUZcxnFeTStaVd9wOUhz15HW4wi-Y6-e_AoH_TCkFBdf7Ela1cSdDVEAfT24vsauyMaBc6a0bKuVdQe5KUv4e3PrnoaPFezKr-xoHe946rbM2NlMoruSDOVn8XttfICQPnIpg2fqdGeTQyA"/>
</div>
<h1 class="font-['Plus_Jakarta_Sans'] font-black uppercase tracking-tighter text-xl text-amber-900 drop-shadow-sm">MASTER PLANNER</h1>
</div>
<nav class="hidden md:flex gap-6">
<a class="text-amber-900 font-bold font-['Plus_Jakarta_Sans'] uppercase tracking-tight hover:bg-amber-200 p-2 rounded-lg transition-all" href="#">Roadmaps</a>
<a class="text-amber-800/60 font-['Plus_Jakarta_Sans'] uppercase tracking-tight hover:bg-amber-200 p-2 rounded-lg transition-all" href="#">Library</a>
<a class="text-amber-800/60 font-['Plus_Jakarta_Sans'] uppercase tracking-tight hover:bg-amber-200 p-2 rounded-lg transition-all" href="#">Settings</a>
</nav>
</header>
<!-- Content Backdrop (Mock Dashboard) -->
<main class="p-margin max-w-5xl mx-auto opacity-40 select-none pointer-events-none">
<div class="mb-lg">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Active Voyages</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Your current path to legendary status.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="bg-surface-container border-4 border-outline-variant p-md rounded-xl block-shadow-container h-48"></div>
<div class="bg-surface-container border-4 border-outline-variant p-md rounded-xl block-shadow-container h-48"></div>
</div>
</main>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-background/60 backdrop-blur-sm z-[60] flex items-center justify-center p-gutter">
<!-- Modal Card: "Plank/Scroll" Metaphor -->
<div class="bg-surface border-4 border-on-surface-variant rounded-[32px] w-full max-w-lg overflow-hidden block-shadow-container">
<!-- Header Ribbon -->
<div class="bg-tertiary p-md border-b-4 border-on-tertiary-fixed-variant text-center">
<h3 class="font-headline-md text-headline-md text-on-tertiary uppercase tracking-wider">Chart New Course</h3>
</div>
<!-- Modal Content -->
<div class="p-lg space-y-lg">
<!-- Input Field: Roadmap Title -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="edit">edit</span>
                        Roadmap Title
                    </label>
<input class="w-full bg-[#fdf5e6] border-4 border-outline-variant rounded-xl p-md font-body-lg focus:border-primary-container focus:ring-0 transition-all outline-none" placeholder="e.g. Find the Lost Lagoon" type="text"/>
</div>
<!-- Select Mark & Color Section -->
<div class="space-y-md">
<label class="font-label-bold text-label-bold text-on-surface-variant uppercase flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="flag">flag</span>
                        Select Mark &amp; Color
                    </label>
<div class="grid grid-cols-4 gap-sm">
<!-- Icons Grid -->
<button class="aspect-square flex items-center justify-center bg-primary-container border-4 border-primary rounded-xl text-primary pressed-state shadow-[0px_4px_0px_0px_rgba(112,93,0,1)]">
<span class="material-symbols-outlined !text-4xl" data-icon="ship">sailing</span>
</button>
<button class="aspect-square flex items-center justify-center bg-surface-container border-4 border-outline-variant rounded-xl text-on-surface-variant hover:border-primary transition-colors">
<span class="material-symbols-outlined !text-4xl" data-icon="map">map</span>
</button>
<button class="aspect-square flex items-center justify-center bg-surface-container border-4 border-outline-variant rounded-xl text-on-surface-variant hover:border-primary transition-colors">
<span class="material-symbols-outlined !text-4xl" data-icon="anchor">anchor</span>
</button>
<button class="aspect-square flex items-center justify-center bg-surface-container border-4 border-outline-variant rounded-xl text-on-surface-variant hover:border-primary transition-colors">
<span class="material-symbols-outlined !text-4xl" data-icon="explore">explore</span>
</button>
</div>
<!-- Colors Row -->
<div class="flex gap-md justify-center pt-xs">
<button class="w-10 h-10 rounded-full bg-primary-container border-4 border-primary ring-4 ring-offset-2 ring-primary ring-opacity-100"></button>
<button class="w-10 h-10 rounded-full bg-secondary-container border-4 border-secondary hover:scale-110 transition-transform"></button>
<button class="w-10 h-10 rounded-full bg-tertiary-container border-4 border-tertiary hover:scale-110 transition-transform"></button>
</div>
</div>
<!-- Footer Buttons -->
<div class="flex flex-col sm:flex-row gap-md pt-base">
<button class="flex-1 py-md px-lg bg-surface-container-highest border-4 border-on-surface-variant text-on-surface-variant font-headline-md uppercase rounded-xl hover:bg-surface-variant transition-colors pressed-state shadow-[0px_4px_0px_0px_rgba(77,71,50,0.4)]">
                        Cancel
                    </button>
<button class="flex-1 py-md px-lg bg-primary-container border-4 border-primary text-on-primary-container font-headline-md uppercase rounded-xl pressed-state block-shadow-primary flex items-center justify-center gap-2">
                        Set Sail
                        <span class="material-symbols-outlined" data-icon="directions_boat">directions_boat</span>
</button>
</div>
</div>
<!-- Corner Decor -->
<div class="relative h-4 w-full">
<div class="absolute bottom-0 right-0 p-xs opacity-20">
<span class="material-symbols-outlined !text-6xl" data-icon="skull">skull</span>
</div>
</div>
</div>
</div>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-2 pb-6 bg-[#F5E6D3] dark:bg-slate-900 border-t-4 border-amber-900 shadow-[0px_-4px_0px_0px_rgba(120,60,40,1)] rounded-t-[32px] md:hidden">
<a class="flex flex-col items-center justify-center bg-amber-400 text-amber-950 rounded-xl px-4 py-1 border-2 border-amber-900 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]" href="#">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-['Plus_Jakarta_Sans'] text-xs font-black uppercase">Roadmaps</span>
</a>
<a class="flex flex-col items-center justify-center text-amber-900/70 p-2 hover:scale-110 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
<span class="font-['Plus_Jakarta_Sans'] text-xs font-black uppercase">Library</span>
</a>
<a class="flex flex-col items-center justify-center text-amber-900/70 p-2 hover:scale-110 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Plus_Jakarta_Sans'] text-xs font-black uppercase">Settings</span>
</a>
</nav>
</body></html>
